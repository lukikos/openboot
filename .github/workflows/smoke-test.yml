name: Smoke Test

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to test (defaults to main)'
        required: false
        default: 'main'
  workflow_call:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to test'
        required: false
        type: string
        default: 'main'

jobs:
  smoke-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Vet
        run: go vet ./...

      - name: Build
        run: make build

      - name: Run smoke tests
        run: make test-smoke

      - name: Upload snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-snapshots
          path: |
            /tmp/openboot-smoke-*.json
          retention-days: 7
          if-no-files-found: ignore

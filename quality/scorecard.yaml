# Quality scorecard — weights must sum to 100
dimensions:
  - name: test_coverage
    weight: 25
    tool: go_test_cover
    thresholds:
      perfect: 90    # 10/10
      good: 80       # 8/10
      acceptable: 70 # 6/10
      poor: 60       # 4/10

  - name: lint_errors
    weight: 20
    tool: golangci_lint
    thresholds:
      perfect: 0     # 10/10
      good: 3        # 8/10
      acceptable: 8  # 6/10
      poor: 15       # 4/10

  - name: security
    weight: 25
    tool: gosec
    thresholds:
      perfect: 0     # 10/10
      good: 1        # 8/10
      acceptable: 3  # 6/10
      poor: 6        # 4/10

  - name: complexity
    weight: 15
    tool: gocyclo
    description: "average cyclomatic complexity"
    thresholds:
      perfect: 5     # 10/10
      good: 8        # 8/10
      acceptable: 12 # 6/10
      poor: 18       # 4/10

  - name: file_size
    weight: 15
    tool: wc_lines
    description: "files over 800 lines"
    thresholds:
      perfect: 0     # 10/10
      good: 1        # 8/10
      acceptable: 3  # 6/10
      poor: 6        # 4/10
